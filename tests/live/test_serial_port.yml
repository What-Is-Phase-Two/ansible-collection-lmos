---
# Live test: serial port 1/1 on LM_LM4
# Device on port 1/1: Cisco WS-C3560CG-8TC-S (core-rtr-01), IOS 15.2(2)E10
# Console auto-authenticates (no login prompt). Access: port 1/1 -> terminal
- name: Serial port 1/1 tests - LM_LM4
  hosts: all
  gather_facts: false

  tasks:
    - name: 1. Show all port status
      ansible.netcommon.cli_command:
        command: "show port\r\n"
      register: show_port

    - name: 1a. Print port table (4 ports, all native mode)
      ansible.builtin.debug:
        var: show_port.stdout_lines

    - name: 2. Show session - confirm Con * signal on port 1/1
      ansible.netcommon.cli_command:
        command: "show session\r\n"
      register: show_session_top

    - name: 2a. Confirm port 1/1 has serial connection signal
      ansible.builtin.assert:
        that:
          - "'1/1' in show_session_top.stdout"
        fail_msg: "Port 1/1 not found in session output"
        success_msg: "Port 1/1 confirmed present in session output"

    - name: 3. Confirm Con signal on port 1/1 (physical serial cable present)
      ansible.builtin.assert:
        that:
          - "'1/1' in show_session_top.stdout"
        success_msg: "Serial connection present on port 1/1"
        fail_msg: "No serial connection on port 1/1"

    - name: 4. Show system management (UCC connection status)
      ansible.netcommon.cli_command:
        command: "show system management\r\n"
      register: show_mgmt

    - name: 4a. Print management server status
      ansible.builtin.debug:
        var: show_mgmt.stdout_lines

    - name: 5. Show system ntp
      ansible.netcommon.cli_command:
        command: "show system ntp\r\n"
      register: show_ntp

    - name: 5a. Print NTP config
      ansible.builtin.debug:
        var: show_ntp.stdout_lines

    - name: 6. Show events (recent activity including serial port)
      ansible.netcommon.cli_command:
        command: "show events\r\n"
      register: show_events

    - name: 6a. Print events
      ansible.builtin.debug:
        var: show_events.stdout_lines
