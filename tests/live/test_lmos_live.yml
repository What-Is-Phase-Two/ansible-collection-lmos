---
- name: lantronix.lmos live device tests - LM_LM4
  hosts: all
  gather_facts: false

  tasks:
    - name: 1. Gather LMOS facts (show ver + show system ip)
      lantronix.lmos.lmos_facts:
      register: facts_result

    - name: 1a. Print all gathered facts
      debug:
        var: ansible_facts.lmos_facts

    - name: 2. Run show ver via cli_command
      ansible.netcommon.cli_command:
        command: "show ver\r\n"
      register: show_ver

    - name: 2a. Print show ver output
      debug:
        var: show_ver.stdout_lines

    - name: 3. Run show system ip
      ansible.netcommon.cli_command:
        command: "show system ip\r\n"
      register: show_sys_ip

    - name: 3a. Print show system ip
      debug:
        var: show_sys_ip.stdout_lines

    - name: 4. Run show system authentication
      ansible.netcommon.cli_command:
        command: "show system authentication\r\n"
      register: show_auth

    - name: 4a. Print show system authentication
      debug:
        var: show_auth.stdout_lines

    - name: 5. Run show port 1 (serial port connected to Cisco C3560G)
      ansible.netcommon.cli_command:
        command: "show port 1\r\n"
      register: show_port1

    - name: 5a. Print show port 1
      debug:
        var: show_port1.stdout_lines

    - name: 6. Run show session
      ansible.netcommon.cli_command:
        command: "show session\r\n"
      register: show_session

    - name: 6a. Print show session
      debug:
        var: show_session.stdout_lines
